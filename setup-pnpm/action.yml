name: Set up pnpm
description: >
  Wrap pnpm/action-setup with a per-job install directory under RUNNER_TEMP, so
  concurrent jobs on a shared self-hosted runner do not clobber a common
  ~/setup-pnpm. The pnpm version is read from package.json's packageManager
  field unless overridden.

inputs:
  version:
    description: pnpm version. Defaults to the packageManager field in package.json.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        dest: ${{ runner.temp }}/setup-pnpm
        version: ${{ inputs.version }}
