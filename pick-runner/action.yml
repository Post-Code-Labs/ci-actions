name: Pick runner
description: >
  Select where a heavy job runs: prefer an idle, online self-hosted runner in
  the homelab org runner group; fall back to GitHub-hosted cloud otherwise.
  GitHub Actions has no native "use self-hosted if available, else cloud" switch
  — a job pinned to an offline runner just queues until timeout — so a job uses
  this action up front and feeds the `runs_on` output into its `runs-on` via
  fromJSON.

inputs:
  runner-status-token:
    description: >
      Fine-grained PAT with org "Self-hosted runners: read" for this repo's org.
      Empty on fork PRs and Dependabot runs (secrets aren't exposed there) — the
      probe then falls back to cloud, so untrusted code never lands on homelab.
    required: false
    default: ''
  group-name:
    description: Org runner group to probe for idle runners.
    required: false
    default: 'homelab@121'

outputs:
  runs_on:
    description: 'JSON value for `runs-on`: the string "ubuntu-latest" or a runner-group object.'
    value: ${{ steps.pick.outputs.runs_on }}

runs:
  using: composite
  steps:
    - name: Probe homelab runner group
      id: pick
      shell: bash
      env:
        RUNNER_STATUS_TOKEN: ${{ inputs.runner-status-token }}
        ORG: ${{ github.repository_owner }}
        GROUP_NAME: ${{ inputs.group-name }}
      run: bash "$GITHUB_ACTION_PATH/pick-runner.sh"
