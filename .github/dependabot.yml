version: 2
updates:
  - package-ecosystem: github-actions
    # "/" covers .github/workflows and a root action.yml; nested composite
    # actions (e.g. setup-pnpm/action.yml) are not recursed into, so list them.
    directories:
      - "/"
      - "/setup-pnpm"
      - "/setup-uv"
    schedule:
      interval: weekly
    groups:
      github-actions:
        update-types:
          - minor
          - patch
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
